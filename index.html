<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRC Staking Dashboard</title>

<!-- Fonts + Chart -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Ethers.js + Web3Modal -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.1/dist/ethers.min.js"></script>
<script src="https://unpkg.com/web3modal@2.5.6/dist/index.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@2.8.1/dist/umd/index.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>TRC Staking Dashboard</h1>
    <button id="connectWallet" class="btn wallet-btn">Connect Wallet</button>
  </header>

  <section class="stats">
    <div class="card">
      <h3>Wallet</h3>
      <p id="wallet">Not Connected</p>
    </div>
    <div class="card">
      <h3>Pending Rewards</h3>
      <p id="pendingReward">0</p>
    </div>
    <div class="card">
      <h3>Last Claim</h3>
      <p id="lastClaim">-</p>
    </div>
    <div class="card">
      <h3>Next Claim</h3>
      <p id="nextClaim">-</p>
    </div>
    <div class="card">
      <h3>Total Weight</h3>
      <p id="totalWeight">0</p>
    </div>
    <div class="card">
      <h3>Base / Temp Weight</h3>
      <p id="baseWeight">0 / <span id="tempWeight">0</span></p>
    </div>
  </section>

  <section class="staking">
    <h2>Approve & Stake</h2>
    <div class="stake-actions">
      <input type="number" id="approveAmount" placeholder="Amount to Approve">
      <button id="approveBtn" class="btn action-btn">Approve</button>
    </div>
    <div class="stake-buttons">
      <button class="btn stakeBtn" data-days="30">Stake 30 Days</button>
      <button class="btn stakeBtn" data-days="60">Stake 60 Days</button>
      <button class="btn stakeBtn" data-days="90">Stake 90 Days</button>
      <button class="btn stakeBtn" data-days="150">Stake 150 Days</button>
      <button class="btn stakeBtn" data-days="365">Stake 365 Days</button>
    </div>
    <div class="stake-actions">
      <button id="claimAllBtn" class="btn action-btn">Claim All Rewards</button>
    </div>
  </section>

  <section class="stake-history">
    <h2>Stake History</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Amount</th>
          <th>Weight</th>
          <th>Unlock Time</th>
          <th>Status</th>
          <th>Claim</th>
          <th>Close</th>
        </tr>
      </thead>
      <tbody id="stakeHistory"></tbody>
    </table>
  </section>

  <section class="chart-container">
    <h2>TRC Price Chart</h2>
    <canvas id="priceChart"></canvas>
  </section>

  <div id="status" class="status"></div>

</div>

<script src="app.js"></script>
</body>
</html>
