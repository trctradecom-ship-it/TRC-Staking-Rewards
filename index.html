<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Staking DApp</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ Load Ethers.js and Chart.js via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

</head>

<body>

<div class="container">

<h2>🔥 Polygon Staking</h2>

<!-- WALLET -->
<div class="card">
<button id="connectBtn">Connect Wallet</button>
<p id="wallet">Not Connected</p>
<p>Balance: <span id="balance">0</span></p>
</div>

<!-- STAKE -->
<div class="card">
<h3>Stake Tokens</h3>

<input id="stakeAmount" type="number" step="0.01" placeholder="Enter amount (e.g. 10)">

<button id="approveBtn">Approve Token</button>

<button onclick="stake('stake30')">Stake 30 Days</button>
<button onclick="stake('stake60')">Stake 60 Days</button>
<button onclick="stake('stake90')">Stake 90 Days</button>
<button onclick="stake('stake150')">Stake 150 Days</button>
<button onclick="stake('stake365')">Stake 365 Days</button>
</div>

<!-- CLAIM -->
<div class="card">
<h3>Claim Rewards</h3>
<button id="claimBtn">Claim Rewards</button>
<p>Pending Reward: <span id="pendingReward">0</span></p>
</div>

<!-- STAKES -->
<div class="card">
<h3>Your Stakes</h3>
<div id="stakeList">No stakes yet</div>
</div>

<!-- HISTORY -->
<div class="card">
<h3>Last 5 Claims</h3>
<ul id="claimHistory"></ul>
</div>

<!-- Status -->
<div id="status" class="status"></div>

<!-- Chart Container -->
<div class="card">
<h3>Liquidity / Balance Chart</h3>
<canvas id="liquidityChart" style="height:300px;"></canvas>
</div>

<script src="app.js" defer></script>

</div>

</body>
</html>
