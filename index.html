<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRC Staking Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
<script src="https://unpkg.com/web3modal"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <header>
    <h1>TRC Staking Dashboard</h1>
    <button id="connectWallet">Connect Wallet</button>
    <span id="wallet">Not Connected</span>
  </header>

  <section class="dashboard">
    <div class="card">
      <h2>Wallet Info</h2>
      <p>Address: <span id="walletDisplay">-</span></p>
    </div>

    <div class="card">
      <h2>Pending Reward</h2>
      <p><span id="pending">0</span> TRC</p>
    </div>

    <div class="card">
      <h2>Total Weight</h2>
      <p><span id="totalWeight">0</span></p>
    </div>

    <div class="card">
      <h2>Reward Pool</h2>
      <p><span id="rewardPool">0</span> TRC</p>
    </div>
  </section>

  <section class="actions">
    <div class="action-card">
      <h2>Approve TRC</h2>
      <input type="number" id="approveAmount" placeholder="Enter amount">
      <button onclick="approveTRC(document.getElementById('approveAmount').value)">Approve</button>
    </div>

    <div class="action-card">
      <h2>Stake TRC</h2>
      <input type="number" id="stakeAmount" placeholder="Enter amount">
      <div class="stake-buttons">
        <button onclick="stake(document.getElementById('stakeAmount').value,'30')">Stake 30 Days</button>
        <button onclick="stake(document.getElementById('stakeAmount').value,'60')">Stake 60 Days</button>
        <button onclick="stake(document.getElementById('stakeAmount').value,'90')">Stake 90 Days</button>
        <button onclick="stake(document.getElementById('stakeAmount').value,'150')">Stake 150 Days</button>
        <button onclick="stake(document.getElementById('stakeAmount').value,'365')">Stake 365 Days</button>
      </div>
    </div>

    <div class="action-card">
      <h2>Claim Reward</h2>
      <button onclick="claimReward()">Claim Reward</button>
    </div>
  </section>

  <section class="chart-section">
    <h2>TRC Price Chart</h2>
    <canvas id="priceChart"></canvas>
  </section>

  <section class="status">
    <h2>Status</h2>
    <div id="status">Waiting for wallet connection...</div>
  </section>

</div>

<script src="staking.js"></script>
</body>
</html>
