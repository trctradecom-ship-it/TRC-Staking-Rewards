<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRC Staking Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
/* ------------------------
  GENERAL RESET & BODY
------------------------ */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
  color: #fff;
  min-height: 100vh;
}

/* ------------------------
  CONTAINER
------------------------ */
.container {
  max-width: 1200px;
  margin: 2rem auto;
  padding: 1rem;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

/* ------------------------
  CARDS
------------------------ */
.card {
  background: #1f1f1f;
  border: 2px solid #FFD700;
  border-radius: 15px;
  padding: 1.5rem;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
}

/* ------------------------
  HEADINGS
------------------------ */
.card h3 {
  margin-bottom: 1rem;
  font-weight: 700;
  color: #FFD700;
}

/* ------------------------
  BUTTONS
------------------------ */
button {
  padding: 0.6rem 1.2rem;
  background: linear-gradient(45deg,#FFD700,#FFAA00);
  border:none;
  border-radius:10px;
  font-weight:700;
  color:#111;
  cursor:pointer;
  transition: all 0.3s;
  margin-top:0.5rem;
}
button:hover {
  background: linear-gradient(45deg,#FFAA00,#FFD700);
  transform: scale(1.05);
}

/* ------------------------
  INPUTS
------------------------ */
input {
  width: 100%;
  padding: 0.6rem;
  border-radius: 10px;
  border: 1px solid #FFD700;
  margin-top:0.5rem;
  background: #0f0f0f;
  color: #fff;
}

/* ------------------------
  WALLET TEXT
------------------------ */
#wallet {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  color: #fff;
  background: #333;
  padding: 0.5rem;
  border-radius: 10px;
  overflow-wrap: break-word;
}

/* ------------------------
  STATUS
------------------------ */
#status {
  margin-top:0.5rem;
  font-size:0.9rem;
  line-height:1.3;
  color:#FFD700;
}

/* ------------------------
  STAKE HISTORY
------------------------ */
.stakeEntry {
  border:1px solid #FFD700;
  padding:0.8rem;
  border-radius:10px;
  margin-bottom:0.5rem;
  background:#111;
  font-size:0.9rem;
}

/* ------------------------
  RESPONSIVE
------------------------ */
@media(max-width:600px){
  .container { grid-template-columns: 1fr; }
  button { width: 100%; }
}
</style>
</head>
<body>

<div class="container">

  <!-- WALLET CONNECT -->
  <div class="card">
    <h3>1️⃣ Connect Wallet</h3>
    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="wallet">Not connected</p>
  </div>

  <!-- APPROVE TRC -->
  <div class="card">
    <h3>2️⃣ Approve TRC</h3>
    <input id="approveAmount" placeholder="Amount TRC to approve">
    <button onclick="approveTRC()">Approve</button>
  </div>

  <!-- STAKE OPTIONS -->
  <div class="card">
    <h3>3️⃣ Stake TRC</h3>
    <input id="stakeAmount" placeholder="Amount TRC to stake">
    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;">
      <button onclick="stake('stakeAmount',30)">Stake 30d</button>
      <button onclick="stake('stakeAmount',60)">Stake 60d</button>
      <button onclick="stake('stakeAmount',90)">Stake 90d</button>
      <button onclick="stake('stakeAmount',150)">Stake 150d</button>
      <button onclick="stake('stakeAmount',365)">Stake 365d</button>
    </div>
  </div>

  <!-- CLAIM REWARD -->
  <div class="card">
    <h3>4️⃣ Claim Rewards</h3>
    <button onclick="claimRewards()">Claim All</button>
    <p>Pending: <span id="pendingReward">0</span> TRC</p>
    <p>Last Claim: <span id="lastClaim">-</span></p>
    <p>Next Claim: <span id="nextClaim">-</span></p>
  </div>

  <!-- DASHBOARD INFO -->
  <div class="card">
    <h3>Dashboard</h3>
    <p>Total Weight: <span id="totalWeight">0</span></p>
    <p>Reward Pool: <span id="rewardPool">0</span></p>
  </div>

  <!-- STAKE HISTORY -->
  <div class="card">
    <h3>Stake History</h3>
    <div id="stakeHistory"></div>
  </div>

  <!-- TRANSACTION STATUS -->
  <div class="card">
    <h3>Status</h3>
    <p id="status">No actions yet</p>
  </div>

</div>

<script src="staking.js"></script>
</body>
</html>
