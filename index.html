<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRC Staking Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

</head>

<body>

<div class="container">

<h1>TRC Staking</h1>

<div class="card">

<button onclick="connectWallet()" class="connect">
Connect Wallet
</button>

<p id="wallet">Wallet not connected</p>

</div>

<div class="card">

<h3>Approve TRC</h3>

<input id="approveAmount" placeholder="Amount">

<button onclick="approveTRC()">Approve</button>

</div>

<div class="card">

<h3>Stake TRC</h3>

<input id="stakeAmount" placeholder="Amount">

<div class="grid">

<button onclick="stake30()">30 Days</button>
<button onclick="stake60()">60 Days</button>
<button onclick="stake90()">90 Days</button>
<button onclick="stake150()">150 Days</button>
<button onclick="stake365()">365 Days</button>

</div>

</div>

<div class="card">

<h3>Claim Rewards</h3>

<button onclick="claimRewards()">Claim All</button>

</div>

<div class="card">

<h3>Your Stakes</h3>

<div id="stakeHistory"></div>

</div>

<p id="status">Ready</p>

</div>

<script src="staking.js"></script>

</body>
</html>
